name: Retrain Model

on:
  workflow_dispatch:  # manual trigger from Actions tab
  schedule:
    - cron: '0 2 * * 0'  # every Sunday at 02:00 UTC

jobs:
  retrain:
    name: Retrain ML model via DVC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Run DVC pipeline on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          ssh $EC2_USER@$EC2_HOST << EOF
            set -e
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION
            export MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI

            cd ~/mlops-project
            git pull origin main

            # Ensure DVC is installed
            pip install --user 'dvc[s3]' || true
            export PATH="\$HOME/.local/bin:\$PATH"

            # Pull current artifacts, reproduce pipeline, push new artifacts
            dvc pull || echo "No existing artifacts to pull"
            dvc repro
            dvc push

            # Restart API to pick up new model
            docker compose restart fraud-api
          EOF

      - name: Wait for API to restart
        run: sleep 30

      - name: Health check after retrain
        run: |
          curl --fail --max-time 10 http://${{ secrets.EC2_HOST }}:8000/ \
            && echo "✅ API is healthy after retrain!" \
            || (echo "❌ API did not respond" && exit 1)