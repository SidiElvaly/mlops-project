name: Retrain Model

on:
  # Manual trigger — always available from Actions tab
  workflow_dispatch:

  # Scheduled weekly retrain (Sunday 02:00 UTC)
  schedule:
    - cron: '0 2 * * 0'

  # Auto-trigger when ML-relevant files change on main
  push:
    branches:
      - main
    paths:
      - 'src/preprocess.py'
      - 'src/train.py'
      - 'src/evaluate.py'
      - 'src/register.py'
      - 'dvc.yaml'
      - 'params.yaml'
      - 'requirements.txt'
      - 'data/raw/**.dvc'

jobs:
  retrain:
    name: Retrain ML model via DVC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Run DVC pipeline on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          ssh $EC2_USER@$EC2_HOST << EOF
            set -e
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION
            export MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI

            cd ~/mlops-project
            git reset --hard origin/main
            git pull origin main

            # Activate the ML pipeline venv (has python + xgboost + sklearn)
            source ~/.venv/mlpipeline/bin/activate

            # Pull current artifacts, reproduce pipeline, push new artifacts
            dvc pull || echo "No existing artifacts to pull"
            dvc repro
            dvc push

            # Restart API to pick up new model
            docker compose restart fraud-api
          EOF

      - name: Wait for API to restart
        run: sleep 30

      - name: Health check after retrain
        run: |
          curl --fail --max-time 10 http://${{ secrets.EC2_HOST }}:8000/ \
            && echo "✅ API is healthy after retrain!" \
            || (echo "❌ API did not respond" && exit 1)
